name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: |
        pip install -r backend/requirements.txt
        pip install pytest
    - name: Run tests
      run: pytest tests/backend
    - name: Lint backend
      run: ruff check backend

  test-frontend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '22'
    - name: Install dependencies
      run: cd frontend && npm install
    - name: Lint frontend
      run: cd frontend && npx eslint .
    - name: Run tests
      run: cd frontend && npm test -- --watch=false
