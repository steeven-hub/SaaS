name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: |
        pip install -r backend/requirements.txt
        pip install pytest pytest-django pandas openpyxl polars fastexcel
    - name: Run tests
      run: |
        export PYTHONPATH=$PYTHONPATH:$(pwd)/backend
        pytest tests/backend
    - name: Lint backend
      run: |
        pip install ruff
        ruff check backend

  test-frontend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
    - name: Install dependencies
      run: cd saas_data_frontend && npm install
    - name: Build frontend
      run: cd saas_data_frontend && npm run build
