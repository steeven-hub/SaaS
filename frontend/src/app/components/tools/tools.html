<div class="container">
  <h2>ApexEngine Tools</h2>
  
  <div class="tools-grid">
    <!-- Module Hackathon -->
    <div class="card">
      <h3>Hackathon Engine</h3>
      <input type="file" (change)="onFileSelected($event, 'eda')">
      <button class="btn-primary" (click)="runEDA()">Lancer Auto-EDA</button>
      <input type="file" (change)="onFileSelected($event, 'sub')" placeholder="Submission">
      <input type="file" (change)="onFileSelected($event, 'sample')" placeholder="Sample">
      <button class="btn-primary" (click)="validate()">Valider Soumission</button>
    </div>

    <!-- Module BI -->
    <div class="card">
      <h3>Hub de Décision IA</h3>
      <button class="btn-primary" (click)="getInsights()">Générer Insights IA</button>
      <button class="btn-primary" (click)="generatePDF()">Télécharger Rapport PDF</button>
    </div>
  </div>
</div>
